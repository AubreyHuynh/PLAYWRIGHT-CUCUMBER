name: Playwright + Cucumber Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: 'Cucumber profile (default/ui/api/smoke)'
        required: false
        default: 'default'

jobs:
  test:
    name: Tests (${{ matrix.os }} / ${{ matrix.browser }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        browser: [chromium, firefox]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Create env file
        run: cp .env.example config/.env.dev

      - name: Run tests
        env:
          ENV: dev
          BROWSER: ${{ matrix.browser }}
          HEADLESS: 'true'
        run: npm run ${{ github.event.inputs.profile || 'test' }}

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.os }}-${{ matrix.browser }}
          path: allure-results/
          retention-days: 30

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.os }}-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: traces-${{ matrix.os }}-${{ matrix.browser }}
          path: test-results/
          retention-days: 7
