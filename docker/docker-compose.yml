version: '3.8'

services:
  tests:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - ENV=dev
      - HEADLESS=true
      - BROWSER=chromium
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
    depends_on:
      - mailhog
    volumes:
      - ../allure-results:/app/allure-results
      - ../playwright-report:/app/playwright-report
      - ../test-results:/app/test-results

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # Web UI

  # Optional: uncomment to add a local DB
  # postgres:
  #   image: postgres:15
  #   environment:
  #     POSTGRES_DB: testdb
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #   ports:
  #     - '5432:5432'
