image: mcr.microsoft.com/playwright:v1.49.1-noble

stages:
  - lint
  - test

variables:
  ENV: dev
  HEADLESS: "true"

lint:
  stage: lint
  script:
    - npm ci
    - npm run lint

test:ui:
  stage: test
  script:
    - npm ci
    - npx playwright install chromium
    - cp .env.example config/.env.dev
    - npm run test:ui
  artifacts:
    when: always
    paths:
      - allure-results/
      - playwright-report/
      - test-results/
    expire_in: 30 days

test:api:
  stage: test
  script:
    - npm ci
    - cp .env.example config/.env.dev
    - npm run test:api
  artifacts:
    when: always
    paths:
      - allure-results/
    expire_in: 30 days
